      - sonic-network-manager
      - sonic-night-light
      - sonic-screen
      - sonic-screen-library
      - sonic-screenlocker
      - sonic-silver-sddm
      - sonic-silver-theme
      - sonic-sysguard-library
      - sonic-system-info
      - sonic-win
      - sonic-workspace
      - sonic-workspace-addons
      - sonic-workspace-wallpapers
      - sonicde-meta
    runs-on: ubuntu-slim
    steps:
      - name: All built
        run: echo 'all built'

  publish:
    needs: all-packages
    if: ${{ 0 == 1 }}
    runs-on: ubuntu-slim
    steps:
      - name: Authenticate via app
        id: app-token
        if: ${{ vars.APP_CLIENT_ID }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
