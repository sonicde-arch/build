name: Build All and Publish

on:
  workflow_dispatch:
    inputs:
      force-build:
       description: Force the build of all packages
       type: boolean
       default: false

jobs:
  sonic-activities:
    uses: ./.github/workflows/build-package.yml
    needs:
      - sonic-frameworks-cmake-modules
      - sonic-frameworks-core-addons
    with:
      repository: ${{ github.repository_owner }}/sonic-activities
      force-build: ${{ inputs.force-build }}
    secrets: inherit

  sonic-audio-applet-pulse:
    uses: ./.github/workflows/build-package.yml
    needs:
      - sonic-frameworks-cmake-modules
      - sonic-frameworks-core-addons
      - sonic-frameworks-doctools
      - sonic-frameworks-keybind
      - sonic-frameworks-quick-ui
      - sonic-interface-libraries
      - sonic-workspace
    with:
      repository: ${{ github.repository_owner }}/sonic-audio-applet-pulse
      force-build: ${{ inputs.force-build }}
    secrets: inherit

  sonic-decoration:
